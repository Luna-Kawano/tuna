# netlify.toml
# ──────────────────────────────────────────────────────────────
# Drop this file in the ROOT of your GitHub repo alongside index.html.
# It tells Netlify where your serverless functions live and how to build.
# ──────────────────────────────────────────────────────────────

[build]
  publish   = "."
  functions = "netlify/functions"

[functions]
  # Tells Netlify to run npm install inside netlify/functions/
  # so stripe and nodemailer are available at runtime
  node_bundler = "esbuild"

[dev]
  port = 8888
